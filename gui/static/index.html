<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resonator Synth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">RESONATOR SYNTH</div>
  <div class="session-bar">
    <select id="session-select"><option value="">— select session —</option></select>
    <button id="btn-new-session">+ New Session</button>
    <button id="btn-delete-session" class="danger" disabled>Delete</button>
  </div>
</header>

<!-- ── New session modal ────────────────────────────────────────────────────── -->
<div id="modal-new-session" class="modal hidden">
  <div class="modal-box">
    <h2>New Session</h2>
    <label>Session name <input id="new-session-name" type="text" placeholder="grand_steinway"></label>
    <label>Source params
      <select id="new-session-params-select">
        <option value="analysis/params.json">analysis/params.json  (raw extracted)</option>
      </select>
    </label>
    <label id="new-session-params-custom-wrap" class="hidden">Custom path
      <input id="new-session-params-custom" type="text" placeholder="analysis/params_profile_mybank.json">
    </label>
    <label>Instrument name <input id="new-inst-name" type="text" placeholder="KS Grand Piano"></label>
    <label>Author <input id="new-inst-author" type="text" value="n/a"></label>
    <label>Category <input id="new-inst-category" type="text" value="Piano"></label>
    <label>Version <input id="new-inst-version" type="text" value="1"></label>
    <label>Description <input id="new-inst-desc" type="text" value="n/a"></label>
    <div class="modal-actions">
      <button id="btn-create-session">Create</button>
      <button class="cancel" onclick="closeModal('modal-new-session')">Cancel</button>
    </div>
    <div id="modal-error" class="error hidden"></div>
  </div>
</div>

<!-- ── Main layout ──────────────────────────────────────────────────────────── -->
<main class="hidden" id="main-panel">

  <!-- Left: params ──────────────────────────────────────────────────────────── -->
  <section class="panel panel-params">
    <div class="panel-title">PARAMETERS</div>

    <!-- Global groups -->
    <div class="param-group" id="group-render">
      <div class="group-label">RENDER</div>
      <div id="sliders-render"></div>
    </div>
    <div class="param-group" id="group-timbre">
      <div class="group-label">TIMBRE</div>
      <div id="sliders-timbre"></div>
    </div>
    <div class="param-group" id="group-stereo">
      <div class="group-label">STEREO</div>
      <div id="sliders-stereo"></div>
    </div>

    <!-- Per-note overrides -->
    <div class="param-group">
      <div class="group-label">PER-NOTE OVERRIDE</div>
      <div class="note-picker">
        <label>MIDI <input id="note-midi" type="number" min="21" max="108" value="45"></label>
        <span id="note-name-display" class="note-name">A2</span>
        <button id="btn-load-note">Load</button>
        <button id="btn-clear-note" class="danger">Clear</button>
      </div>
      <div id="sliders-per-note"></div>
    </div>

    <button id="btn-save-params" class="primary full-width">Save Parameters</button>
  </section>

  <!-- Center: generate ──────────────────────────────────────────────────────── -->
  <section class="panel panel-generate">
    <div class="panel-title">GENERATE</div>

    <div class="gen-range">
      <div class="range-row">
        <label>MIDI from <input id="gen-from" type="number" min="21" max="108" value="21"></label>
        <label>MIDI to   <input id="gen-to"   type="number" min="21" max="108" value="108"></label>
      </div>
      <div class="vel-row">
        <span class="vel-label">Velocity layers:</span>
        <div id="vel-checkboxes"></div>
      </div>
    </div>

    <div class="gen-actions">
      <button id="btn-generate" class="primary">▶ Generate</button>
      <button id="btn-cancel" class="danger hidden">■ Cancel</button>
    </div>

    <div class="panel-title" style="margin-top:0.75rem">INSTRUMENT VELOCITY PROFILE</div>
    <div class="param-group">
      <div class="group-label">RMS RATIO PER VELOCITY (vel 7 = 1.0)</div>
      <div id="vel-profile-sliders"></div>
      <div class="vel-profile-row" style="margin-top:6px">
        <input id="bank-dir" type="text" value="C:/SoundBanks/IthacaPlayer/ks-grand" style="flex:1;font-size:10px">
        <button id="btn-vel-profile" title="Compute from original WAV files">⟳ From samples</button>
      </div>
      <div id="vel-profile-status" class="status-line"></div>
    </div>

    <div class="panel-title" style="margin-top:0.75rem">TRAIN DDSP PROFILE</div>
    <div class="param-group">
      <div class="group-label">LEARN PARAMS DIRECTLY FROM WAV FILES</div>
      <div class="train-row">
        <input id="train-wav-dir" type="text" value="C:/SoundBanks/IthacaPlayer/ks-grand" style="flex:1;font-size:10px">
      </div>
      <div class="train-row" style="margin-top:4px">
        <label style="font-size:10px">Output <input id="train-out" type="text" value="analysis/params_profile.json" style="width:180px;font-size:10px"></label>
      </div>
      <div class="train-row" style="margin-top:4px;gap:8px">
        <label style="font-size:10px">Epochs <input id="train-epochs" type="number" value="300" min="10" max="2000" style="width:55px"></label>
        <label style="font-size:10px">K-max  <input id="train-kmax"   type="number" value="16"  min="4"  max="32"   style="width:45px"></label>
        <label style="font-size:10px">Seg(s) <input id="train-seg"    type="number" value="0.5" min="0.2" max="3" step="0.1" style="width:45px"></label>
      </div>
      <div class="train-actions" style="margin-top:6px">
        <button id="btn-train-ddsp" class="primary">▶ Train DDSP</button>
        <button id="btn-train-cancel" class="danger hidden">■ Cancel</button>
        <button id="btn-train-apply" class="hidden" style="background:#1a4a1a;border-color:#00cc44">⟶ Apply to session</button>
      </div>
      <div class="progress-bar hidden" id="train-progress-wrap">
        <div class="progress-track"><div id="train-progress-fill" style="width:0%"></div></div>
        <span id="train-progress-label">0 / 0</span>
      </div>
      <div id="train-status" class="status-line"></div>
    </div>

    <div class="progress-bar hidden" id="progress-wrap">
      <div class="progress-track"><div id="progress-fill" style="width:0%"></div></div>
      <span id="progress-label">0 / 0</span>
    </div>
    <div id="gen-status" class="status-line"></div>

    <!-- File list -->
    <div class="panel-title" style="margin-top:1rem">GENERATED FILES</div>
    <div id="file-list" class="file-list"></div>
  </section>

  <!-- Right: player + spectrum ───────────────────────────────────────────────── -->
  <section class="panel panel-audio">
    <div class="panel-title">PLAYER</div>
    <div id="player-filename" class="player-filename">—</div>
    <audio id="audio-player" controls></audio>

    <div class="panel-title" style="margin-top:1rem">SPECTRUM</div>
    <canvas id="spectrum-canvas" width="420" height="200"></canvas>
    <div class="spectrum-labels">
      <span>20 Hz</span><span>200</span><span>2k</span><span>20k Hz</span>
    </div>
    <div id="spectrum-status" class="status-line"></div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
